name: CROUS Monitor

on:
  schedule:
    # Runs at :07, :22, :37, :52 every hour (times are UTC).
    # Deliberately OFF the round quarter-hours: GitHub queues a huge number of
    # crons at :00/:15/:30/:45 and delays or drops them under load. Off-peak
    # minutes fire far more reliably. Minimum interval allowed is 5 minutes.
    - cron: "7,22,37,52 * * * *"
  # Allow running the workflow by hand from the Actions tab.
  workflow_dispatch: {}

# Required so the workflow can commit the updated state.json back to the repo.
permissions:
  contents: write

# Prevent two runs from pushing state at the same time.
concurrency:
  group: crous-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CROUS monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crous_bot.py

      - name: Persist state
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update CROUS monitoring state [skip ci]"
            # Retry once in case another run pushed in the meantime.
            git push || (git pull --rebase --autostash && git push)
          else
            echo "No state change; nothing to commit."
          fi
